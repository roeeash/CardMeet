}

// ─── Deals Screen ─────────────────────────────────────────────────────────────
function DealsScreen({ onNavigate, onToast, onUpdateBadge }) {
  const [deals, setDeals] = useState([]);
  const [activeTab, setActiveTab] = useState('negotiating');
  const [openId, setOpenId] = useState(null);
  const [filter, setFilter] = useState('all');
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  // Fetch deals on mount (Phase 3.10: no fallback seed data)
  useEffect(() => {
    async function loadDeals() {
      setLoading(true);
      setError(null);
      try {
        const response = await fetchJSON('/api/deals');
        // Combine all deal statuses and map them
        const allDeals = [
          ...(response.negotiating || []),
          ...(response.matched || []),
          ...(response.scheduled || []),
        ];
        const mappedDeals = allDeals.map(mapDeal);
        setDeals(mappedDeals);
        setLoading(false);
      } catch (err) {
        console.warn('Failed to fetch deals:', err);
        setDeals([]);
        setError(err.message || 'Failed to load deals');
        setLoading(false);
      }
    }
    loadDeals();

    // Update countdown every minute for scheduled deals
    const countdownInterval = setInterval(() => {
      setDeals(ds => ds.map(d => {
        if (d.status === 'scheduled' && d.meeting?.startTime) {
          return {
            ...d,
            meeting: {
              ...d.meeting,
              countdown: computeCountdown(d.meeting.startTime),
            },
          };
        }
        return d;
      }));
    }, 60000); // Every minute

    return () => clearInterval(countdownInterval);
  }, []);

  const filtered = useMemo(()=>deals.filter(d=>{
    if (d.status!==activeTab) return false;
    if (filter==='shared-con'&&!d.sharedCon?.shared) return false;
    if (filter==='your-turn'&&d.turn!=='you') return false;
    return true;
  }),[deals,activeTab,filter]);

  const counts = useMemo(()=>({ negotiating:deals.filter(d=>d.status==='negotiating').length, matched:deals.filter(d=>d.status==='matched').length, scheduled:deals.filter(d=>d.status==='scheduled').length }),[deals]);
  const yourTurnCount = useMemo(()=>deals.filter(d=>d.turn==='you').length,[deals]);

  // Update badge in parent when your turn count changes
  useEffect(() => {
    if (onUpdateBadge) {
      onUpdateBadge(yourTurnCount);
    }
  }, [yourTurnCount, onUpdateBadge]);
  const upd = (id,fn) => setDeals(ds=>ds.map(d=>d.id===id?fn(d):d));

  const refetchDeal = async (dealId) => {
    try {
      const response = await fetchJSON(`/api/deals/${dealId}`);
      const refreshedDeal = mapDeal(response.deal);
      upd(dealId, () => refreshedDeal);
      return refreshedDeal;
    } catch (err) {
      console.warn('Failed to refetch deal:', err);
      throw err;
    }
  };

  const handleCounter = async (id, amount) => {
    await fetchJSON(`/api/deals/${id}/offer`, {
      method: 'POST',
      body: { price: amount }
    });
    await refetchDeal(id);
    onToast(`Counter sent · ₪${amount.toLocaleString()}`);
    setOpenId(null);
  };

  const handleAccept = async (id) => {
    const deal = deals.find(d => d.id === id);
    if (!deal || !deal.thread || deal.thread.length === 0) {
      throw new Error('No active offer to accept');
    }
    // Get the last offer ID from the thread
    const lastOffer = deal.thread[deal.thread.length - 1];
    if (!lastOffer || !lastOffer.id) {
      throw new Error('No offer ID found');
    }

    await fetchJSON(`/api/deals/${id}/accept/${lastOffer.id}`, {
      method: 'POST',
      body: {}
    });
    await refetchDeal(id);
    onToast('Match confirmed · proposing window');
    setOpenId(null);
    setActiveTab('matched');
  };

  const handleWithdraw = async (id) => {
    await fetchJSON(`/api/deals/${id}`, {
      method: 'DELETE',
      body: {}
    });
    setDeals(ds => ds.filter(d => d.id !== id));
    onToast('Withdrawn');
    setOpenId(null);
  };

  const handleConfirmTime = async (id) => {
    try {
      await refetchDeal(id);
      onToast('Meetup scheduled · check in when ready');
      setActiveTab('scheduled');
    } catch (err) {
      onToast('Failed to confirm time: ' + (err.message || 'unknown error'));
    }
  };

  const handleProposeTime = async (id) => {
    try {
      await refetchDeal(id);
      onToast('Window proposed · waiting for confirmation');
      setOpenId(null);
    } catch (err) {
      onToast('Failed to propose time: ' + (err.message || 'unknown error'));
    }
  };

  const handleCheckIn = async (id) => {
    try {
      await refetchDeal(id);
      onToast('Checked in · partner will see this');
    } catch (err) {
      onToast('Failed to check in: ' + (err.message || 'unknown error'));
    }
  };
  const openDeal = deals.find(d=>d.id===openId);

  return (
    <div style={{ display:'flex',flexDirection:'column',flex:1,overflow:'hidden' }}>
      <div className="app-header">
        <div className="app-title-row">
          <div>
            <div className="app-title">My Deals</div>
            <div className="app-sub">{yourTurnCount>0?<><strong style={{ color:'var(--warn)' }}>{yourTurnCount} need you.</strong> <span className="serif" style={{ fontStyle:'italic' }}>Don't make them wait.</span></>:<span className="serif" style={{ fontStyle:'italic' }}>All caught up.</span>}</div>
          </div>
          <div className="profile-dot" onClick={()=>onNavigate('profile')}>{CURRENT_USER.initials}</div>
        </div>
      </div>
      <div className="deal-tabs">
        {['negotiating','matched','scheduled'].map(t=>(
          <button key={t} className={`deal-tab ${activeTab===t?'active':''}`} onClick={()=>setActiveTab(t)}>
            <span className="tab-count">{counts[t]}</span><span style={{ textTransform:'capitalize' }}>{t}</span>
          </button>
        ))}
      </div>
      <div className="filter-row">
        <button className={`filter-chip ${filter==='all'?'active':''}`} onClick={()=>setFilter('all')}>All</button>
        <button className={`filter-chip ${filter==='your-turn'?'active':''}`} onClick={()=>setFilter('your-turn')}>⚡ Your turn</button>
        <button className={`filter-chip ${filter==='shared-con'?'active':''}`} onClick={()=>setFilter('shared-con')}>📅 Shared con</button>
      </div>
      <div className="screen">
        {loading && (
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', flex:1, gap:12 }}>
            <div style={{ width:40, height:40, borderRadius:'50%', border:'2px solid var(--line)', borderTopColor:'var(--ink)', animation:'spin 0.8s linear infinite' }}/>
            <div style={{ fontSize:12, color:'var(--muted)' }}>Loading deals...</div>
          </div>
        )}
        {error && deals.length === 0 && !loading && (
          <div className="empty">
            <div className="empty-mark"/>
            <div className="empty-title">Failed to load deals</div>
            <div className="empty-body">{error}</div>
          </div>
        )}
        {!loading && (
          <>
            {yourTurnCount>0&&activeTab==='negotiating'&&filter!=='your-turn'&&(
              <div className="turn-banner warn"><span className="pulse"/><span className="turn-banner-label">Your turn ×{yourTurnCount}</span><span className="turn-banner-text serif" style={{ fontStyle:'italic' }}>— don't make them wait.</span></div>
            )}
            {filtered.length===0&&<div className="empty"><div className="empty-mark"/><div className="empty-title" style={{ fontFamily:'Fraunces,serif' }}>Nothing here{activeTab==='negotiating'?filter==='your-turn'?" — you're all caught up.":'. Browse and make an offer.':'.'}</div><div className="empty-body">{activeTab==='negotiating'?'Browse the feed and make your first offer.':activeTab==='matched'?'Once both sides agree, deals appear here.':'Confirmed windows will appear here.'}</div></div>}
            {filtered.map(d=>{
          if (d.status==='negotiating') return (
            <div key={d.id} className="deal-card" onClick={()=>setOpenId(d.id)}>
              <div className="deal-card-top">
                <div style={{ flex:1,minWidth:0 }}><div className="deal-card-card">{d.card.name}</div><div className="deal-card-meta">{d.card.set} · {d.card.printing}</div></div>
                <div style={{ display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6 }}>
                  <div className="deal-price"><span className="deal-price-strike">₪{d.askPrice}</span>₪{d.currentOffer}</div>
                  {d.turn==='you'&&<span className="pill pill-warn">⚡ Your turn</span>}
                  {d.turn==='them'&&<span className="pill pill-muted">Their turn</span>}
                </div>
              </div>
              <SharedCon con={d.sharedCon}/>
              <Counterparty p={d.counterparty}/>
              <div className="nego-thread">{d.thread.slice(-2).map((m,i)=><div key={i} className="nego-row"><span className="nego-actor">{m.actor==='you'?'YOU':'THEM'}</span><span className="nego-amount">₪{m.amount.toLocaleString()}</span><span className="nego-time">{m.t}</span></div>)}</div>
            </div>
          );
          if (d.status==='matched') return (
            <div key={d.id} className="deal-card" onClick={()=>setOpenId(d.id)}>
              <div className="deal-card-top">
                <div style={{ flex:1,minWidth:0 }}><div className="deal-card-card">{d.card.name}</div><div className="deal-card-meta">{d.card.set} · ₪{d.agreedPrice} agreed</div></div>
                <div style={{ display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6 }}>
                  <span className="pill pill-good">✓ Matched</span>
                  {d.turn==='you'&&<span className="pill pill-warn">⚡ Confirm window</span>}
                  {d.turn==='them'&&<span className="pill pill-muted">Waiting</span>}
                </div>
              </div>
              <SharedCon con={d.sharedCon}/>
              <Counterparty p={d.counterparty}/>
              {d.proposed&&<div className="meet-card"><div className="meet-row"><span className="meet-icon">📅</span><div><div className="meet-label">Window</div><div className="meet-val">{d.proposed.window} · {d.proposed.day}</div></div></div><div className="meet-row"><span className="meet-icon">📍</span><div><div className="meet-label">Where</div><div className="meet-val">{d.sharedCon.name}</div></div></div></div>}
            </div>
          );
          if (d.status==='scheduled') return (
            <div key={d.id} className="deal-card" onClick={()=>setOpenId(d.id)}>
              <div className="deal-card-top">
                <div style={{ flex:1,minWidth:0 }}><div className="deal-card-card">{d.card.name}</div><div className="deal-card-meta">{d.card.set} · ₪{d.agreedPrice}</div></div>
                <div style={{ display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6 }}>
                  <span className="pill pill-good">📅 Scheduled</span>
                  <span className="mono" style={{ fontSize:10,color:'var(--muted)' }}>in {d.meeting.countdown}</span>
                </div>
              </div>
              <SharedCon con={d.sharedCon}/>
              <Counterparty p={d.counterparty}/>
              <div className="meet-card" style={{ marginTop:10 }}>
                <div className="meet-row"><span className="meet-icon">📅</span><div><div className="meet-label">Committed window</div><div className="meet-val">{d.meeting.window}</div></div></div>
                <div className="meet-row"><span className="meet-icon">📍</span><div><div className="meet-label">Where</div><div className="meet-val">{d.meeting.spot}</div></div></div>
              </div>
              {!d.meeting.checkedIn&&<button className="btn btn-primary btn-block" style={{ marginTop:10 }} onClick={e=>{e.stopPropagation();handleCheckIn(d.id);}}>I'm here — check in</button>}
              {d.meeting.checkedIn&&<div style={{ marginTop:10,padding:'8px 12px',background:'var(--good-soft)',borderRadius:8,fontSize:12,color:'var(--good)',fontWeight:600,textAlign:'center' }}>✓ Checked in · waiting on partner</div>}
            </div>
          );
          return null;
        })}
            <div style={{ height:24 }}/>
          </>
        )}
      </div>
      {openDeal&&(
        <>
          <div className="sheet-backdrop" onClick={()=>setOpenId(null)}/>
          <DealDetailSheet deal={openDeal} onClose={()=>setOpenId(null)} onCounter={handleCounter} onAccept={handleAccept} onWithdraw={handleWithdraw} onConfirmTime={handleConfirmTime} onProposeTime={handleProposeTime} onCheckIn={handleCheckIn}/>
        </>
      )}
    </div>
  );
}

/**
 * TimePickerModal — Display available time slots for a meetup.
 * Fetches available slots from GET /api/meetups/available-slots.
 */
function TimePickerModal({ eventId, date, onSelect, onCancel, loading: parentLoading }) {
  const [slots, setSlots] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [selectedSlot, setSelectedSlot] = useState(null);

  useEffect(() => {
    async function loadSlots() {
      setLoading(true);
      setError(null);
      try {
        const response = await fetchJSON(`/api/meetups/available-slots?eventId=${eventId}&date=${date.toISOString()}`);
        setSlots(response.slots || []);
      } catch (err) {
        setError(err.message || 'Failed to load available slots');
        setSlots([]);
      }
      setLoading(false);
    }
    if (eventId && date) {
      loadSlots();
    }
  }, [eventId, date]);

  const handleSelect = async (slot) => {
    setSelectedSlot(slot);
    try {
      await onSelect(slot);
    } catch (err) {
      setError(err.message || 'Failed to select time');
      setSelectedSlot(null);
    }
  };

  const formatTime = (dateStr) => {
    const d = new Date(dateStr);
    return d.toLocaleTimeString('en-IL', { hour: '2-digit', minute: '2-digit' });
  };

  return (
    <div className="sheet">
      <div className="sheet-grab"/>
      <div className="sheet-body">
        <div className="sheet-header"><div style={{ flex:1 }}><div className="sheet-title">Choose time</div><div className="sheet-sub">30-minute window</div></div><button className="sheet-close" onClick={onCancel}>✕</button></div>
        {error&&<div style={{ margin:'0 0 14px',padding:10,background:'var(--bad-soft)',borderRadius:6,color:'var(--bad)',fontSize:13,lineHeight:1.4 }}>{error}</div>}
        <div className="sheet-section">
          {loading&&<div style={{ textAlign:'center',padding:24,color:'var(--muted)',fontSize:13 }}>Loading available times...</div>}
          {!loading&&slots.length===0&&<div style={{ textAlign:'center',padding:24,color:'var(--muted)',fontSize:13 }}>No available slots for this date</div>}
          {!loading&&slots.length>0&&(
            <>
              <div className="sheet-section-label">Available times</div>
              <div className="time-slot-grid">
                {slots.map((slot, i) => (
                  <button
                    key={i}
                    className={`time-slot-btn ${selectedSlot===slot?'selected':''}`}
                    onClick={() => handleSelect(slot)}
                    disabled={parentLoading}
                  >
                    {formatTime(slot.startTime)}<br/><span style={{ fontSize:'10px',opacity:0.7 }}>–{formatTime(slot.endTime)}</span>
                  </button>
                ))}
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

function DealDetailSheet({ deal, onClose, onCounter, onAccept, onWithdraw, onConfirmTime, onProposeTime, onCheckIn }) {
  const [counterAmt, setCounterAmt] = useState(String(deal.status==='negotiating'?deal.currentOffer+10:''));
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [showTimePicker, setShowTimePicker] = useState(false);
  const [meetupLoading, setMeetupLoading] = useState(false);
  const isNego=deal.status==='negotiating', isMatched=deal.status==='matched', isSched=deal.status==='scheduled';

  const handleCounter = async () => {
    const amount = Number(counterAmt);
    if (!amount || amount <= 0) {
      setError('Enter a valid price');
      return;
    }
    setLoading(true);
    setError(null);
    try {
      await onCounter(deal.id, amount);
    } catch (err) {
      setError(err.message || 'Counter failed');
    }
    setLoading(false);
  };

  const handleAcceptClick = async () => {
    setLoading(true);
    setError(null);
    try {
      await onAccept(deal.id);
    } catch (err) {
      setError(err.message || 'Accept failed');
    }
    setLoading(false);
  };

  const handleWithdrawClick = async () => {
    setLoading(true);
    setError(null);
    try {
      await onWithdraw(deal.id);
    } catch (err) {
      setError(err.message || 'Withdraw failed');
    }
    setLoading(false);
  };

  const handleProposeTimeClick = () => {
    setShowTimePicker(true);
  };

  const handleSelectTime = async (slot) => {
    setMeetupLoading(true);
    setError(null);
    try {
      // Get eventId from sharedEventIds (use first one)
      const eventId = deal.sharedEventIds && deal.sharedEventIds[0];
      if (!eventId) {
        throw new Error('No shared event found for scheduling');
      }

      // POST /api/meetups with dealId, eventId, startTime, endTime
      const response = await fetchJSON('/api/meetups', {
        method: 'POST',
        body: {
          dealId: deal.id,
          eventId: eventId,
          startTime: slot.startTime,
          endTime: slot.endTime,
          locationNote: deal.sharedCon?.name,
        },
      });

      // Close time picker and update parent
      setShowTimePicker(false);
      onProposeTime(deal.id);
    } catch (err) {
      setError(err.message || 'Failed to propose time');
    }
    setMeetupLoading(false);
  };

  const handleConfirmWindow = async () => {
    setLoading(true);
    setError(null);
    try {
      // Find the meetup ID: check meeting first, then proposed
      let meetupId = null;
      if (deal.meeting && deal.meeting.id) {
        meetupId = deal.meeting.id;
      } else if (deal.proposed && deal.proposed.id) {
        meetupId = deal.proposed.id;
      }

      if (!meetupId) {
        throw new Error('No meetup found to confirm');
      }

      // Determine if current user is buyer
      const currentUserId = getCurrentUserId();
      const isBuyer = deal.buyerId === currentUserId;

      // PUT /api/meetups/:id/confirm with isBuyer flag
      await fetchJSON(`/api/meetups/${meetupId}/confirm`, {
        method: 'PUT',
        body: { isBuyer },
      });

      onConfirmTime(deal.id);
    } catch (err) {
      setError(err.message || 'Failed to confirm window');
    }
    setLoading(false);
  };

  const handleCheckInClick = async () => {
    setLoading(true);
    setError(null);
    try {
      if (!deal.meeting || !deal.meeting.id) {
        throw new Error('No meetup found to check in to');
      }

      // POST /api/meetups/:id/checkin
      await fetchJSON(`/api/meetups/${deal.meeting.id}/checkin`, {
        method: 'POST',
        body: {},
      });

      onCheckIn(deal.id);
    } catch (err) {
      setError(err.message || 'Failed to check in');
    }
    setLoading(false);
  };

  return (
    <>
    <div className="sheet">
      <div className="sheet-grab"/>
      <div className="sheet-body">
        <div className="sheet-header"><div style={{ flex:1 }}><div className="sheet-title">{deal.card.name}</div><div className="sheet-sub">{deal.card.set} · {deal.card.printing}</div></div><button className="sheet-close" onClick={onClose}>✕</button></div>
        {error&&<div style={{ margin:'0 0 14px',padding:10,background:'var(--bad-soft)',borderRadius:6,color:'var(--bad)',fontSize:13,lineHeight:1.4 }}>{error}</div>}
        {deal.turn==='you'&&<div className="turn-banner warn" style={{ margin:'0 0 14px' }}><span className="pulse"/><span className="turn-banner-label">Your turn</span><span className="turn-banner-text">{isNego?'Counter, accept, or withdraw.':isMatched?'Confirm the proposed window.':''}</span></div>}
        {deal.turn==='them'&&<div className="turn-banner muted" style={{ margin:'0 0 14px' }}><span className="turn-banner-label">Waiting on {deal.counterparty.name.split(' ')[0]}</span></div>}
        <div className="sheet-section"><div className="sheet-section-label">Counterparty</div><Counterparty p={deal.counterparty}/><div style={{ marginTop:12 }}><SharedCon con={deal.sharedCon}/></div></div>
        {isNego&&(
          <div className="sheet-section">
            <div className="sheet-section-label">Thread · Asking ₪{deal.askPrice}</div>
            <div className="thread">{deal.thread.map((m,i)=><div key={i} className={`thread-row ${m.actor==='you'?'you':''}`}><span className="thread-actor">{m.actor==='you'?'You':deal.counterparty.name.split(' ')[0]}</span><span className="thread-amount">₪{m.amount.toLocaleString()}</span><span className="thread-time">{m.t}</span></div>)}</div>
            {deal.turn==='you'&&<><div className="counter-input-row"><input className="counter-input" value={counterAmt} onChange={e=>setCounterAmt(e.target.value.replace(/[^\d]/g,''))} placeholder="₪" disabled={loading}/><button className="btn btn-primary" onClick={handleCounter} disabled={loading}>{loading?'Sending...':'Counter'}</button></div><div className="action-row" style={{ marginTop:10 }}><button className="btn btn-secondary" onClick={handleAcceptClick} disabled={loading}>Accept ₪{deal.currentOffer}</button><button className="btn btn-bad" onClick={handleWithdrawClick} disabled={loading}>{loading?'...':'Withdraw'}</button></div></>}
          </div>
        )}
        {isMatched&&(
          <div className="sheet-section">
            <div className="sheet-section-label">Agreed · Propose window</div>
            <div className="meeting-card">
              <div className="meeting-row"><div className="meeting-row-icon">₪</div><div className="meeting-row-info"><div className="meeting-row-label">Price</div><div className="meeting-row-value">₪{deal.agreedPrice || deal.currentOffer}</div></div></div>
              <div className="meeting-row"><div className="meeting-row-icon">📍</div><div className="meeting-row-info"><div className="meeting-row-label">At event</div><div className="meeting-row-value">{deal.sharedCon?.name || 'TBD'}</div></div></div>
            </div>
            {deal.proposed&&(
              <div style={{ marginTop:14, padding:'12px', background:'var(--accent-soft)', borderRadius:10 }}>
                <div style={{ fontSize:11, color:'var(--accent)', fontFamily:'JetBrains Mono,monospace', letterSpacing:'.1em', textTransform:'uppercase', fontWeight:600, marginBottom:8 }}>Proposed window</div>
                <div style={{ fontSize:13, fontWeight:600, marginBottom:2 }}>{deal.proposed.window}</div>
                <div style={{ fontSize:12, color:'var(--muted)' }}>{deal.proposed.day} · {deal.proposed.spot}</div>
                {deal.turn==='you'&&<button className="btn btn-primary" style={{ marginTop:10, width:'100%' }} onClick={handleConfirmWindow} disabled={loading||meetupLoading}>{meetupLoading?'Confirming...':'Confirm meeting time'}</button>}
              </div>
            )}
            {deal.turn==='you'&&!deal.proposed&&<div className="action-row" style={{ marginTop:14 }}><button className="btn btn-primary btn-block" onClick={handleProposeTimeClick} disabled={loading||meetupLoading}>Propose time window</button><button className="btn btn-bad" onClick={handleWithdrawClick} disabled={loading}>{loading?'...':'Withdraw'}</button></div>}
            {deal.turn==='them'&&<div className="action-row" style={{ marginTop:14 }}><button className="btn btn-bad" onClick={handleWithdrawClick} disabled={loading}>{loading?'...':'Withdraw'}</button></div>}
          </div>
        )}
        {isSched&&(
          <div className="sheet-section">
            <div className="sheet-section-label">Committed window</div>
            <div className="meeting-card">
              <div className="meeting-row"><div className="meeting-row-icon">📅</div><div className="meeting-row-info"><div className="meeting-row-label">When</div><div className="meeting-row-value">{deal.meeting?.startTime?formatTime(deal.meeting.startTime):'TBD'}</div><div className="meeting-row-detail">in {deal.meeting?.countdown||'–'}</div></div></div>
              <div className="meeting-row"><div className="meeting-row-icon">📍</div><div className="meeting-row-info"><div className="meeting-row-label">Where</div><div className="meeting-row-value">{deal.sharedCon?.name || 'TBD'}</div></div></div>
              <div className="meeting-row"><div className="meeting-row-icon">₪</div><div className="meeting-row-info"><div className="meeting-row-label">Cash on meet</div><div className="meeting-row-value">₪{deal.agreedPrice||deal.currentOffer}</div></div></div>
            </div>
            <div className="action-row" style={{ marginTop:14 }}>
              {!deal.meeting?.buyerCheckedIn&&!deal.meeting?.sellerCheckedIn?<button className="btn btn-primary btn-block" onClick={handleCheckInClick} disabled={loading}>I'm here — check in</button>:<button className="btn btn-secondary btn-block" disabled>✓ Checked in</button>}
            </div>
            <div style={{ marginTop:10,textAlign:'center' }}><button style={{ background:'transparent',border:'none',color:'var(--bad)',textDecoration:'underline',fontSize:12,cursor:'pointer',padding:4 }} onClick={handleWithdrawClick} disabled={loading}>Cancel meetup</button></div>
          </div>
        )}
      </div>
    </div>
    {showTimePicker&&(
      <>
        <div className="sheet-backdrop" onClick={()=>setShowTimePicker(false)}/>
        <TimePickerModal eventId={deal.sharedEventIds?.[0]} date={new Date()} onSelect={handleSelectTime} onCancel={()=>setShowTimePicker(false)} loading={meetupLoading}/>
      </>
    )}
    </>
  );
}

// ─── Profile Screen ───────────────────────────────────────────────────────────
function ProfileScreen({ onNavigate }) {
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  // Editing state
  const [editingGames, setEditingGames] = useState(false);
  const [selectedGames, setSelectedGames] = useState([]);
  const [editingRadius, setEditingRadius] = useState(false);
  const [selectedRadius, setSelectedRadius] = useState(30);
  const [savingGames, setSavingGames] = useState(false);
  const [savingRadius, setSavingRadius] = useState(false);

  // Load profile on mount (Phase 3.10: keep CURRENT_USER for display fallback only)
  useEffect(() => {
    (async () => {
      setLoading(true);
      setError(null);
      try {
        const data = await fetchProfile();
        if (!data) {
          setError('Failed to load profile');
          setProfile(CURRENT_USER); // Display fallback for hero section
          setSelectedGames(CURRENT_USER.games.map(g => displayToGameCode(g)));
          setSelectedRadius(CURRENT_USER.radius);
        } else {
          setProfile(data);
          setSelectedGames(data.games.map(g => displayToGameCode(g)));
          setSelectedRadius(data.radius);
        }
      } catch (err) {
        console.error('Error loading profile:', err);
        setError('Failed to load profile');
        setProfile(CURRENT_USER); // Display fallback for hero section
        setSelectedGames(CURRENT_USER.games.map(g => displayToGameCode(g)));
        setSelectedRadius(CURRENT_USER.radius);
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  const u = profile || CURRENT_USER;
  const allGames = ['mtg', 'pokemon', 'yugioh', 'lorcana'];

  const toggleGame = (gameCode) => {
    setSelectedGames(prev =>
      prev.includes(gameCode)
        ? prev.filter(x => x !== gameCode)
        : [...prev, gameCode]
    );
  };

  const handleSaveGames = async () => {
    setSavingGames(true);
    try {
      await fetchJSON('/api/profile', {
        method: 'PUT',
        body: { games: selectedGames },
      });
      // Update profile with new games
      const newProfile = { ...profile, games: selectedGames.map(g => gameDisplayName(g)) };
      setProfile(newProfile);
      setEditingGames(false);
    } catch (err) {
      console.error('Error saving games:', err);
      setError('Failed to save games');
    } finally {
      setSavingGames(false);
    }
  };

  const handleCancelGames = () => {
    setSelectedGames(profile ? profile.games.map(g => displayToGameCode(g)) : CURRENT_USER.games.map(g => displayToGameCode(g)));
    setEditingGames(false);
  };

  const handleSaveRadius = async () => {
    setSavingRadius(true);
    try {
      await fetchJSON('/api/profile', {
        method: 'PUT',
        body: { travelRadiusKm: selectedRadius },
      });
      // Update profile with new radius
      const newProfile = { ...profile, radius: selectedRadius };
      setProfile(newProfile);
      setEditingRadius(false);
    } catch (err) {
      console.error('Error saving radius:', err);
      setError('Failed to save radius');
    } finally {
      setSavingRadius(false);
    }
  };

  const handleCancelRadius = () => {
    setSelectedRadius(profile ? profile.radius : CURRENT_USER.radius);
    setEditingRadius(false);
  };

  const handleSignOut = () => {
    clearToken();
    onNavigate('login');
  };

  if (loading) {
    return (
      <div className="screen" style={{ display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ textAlign:'center', color:'var(--muted)' }}>Loading profile...</div>
      </div>
    );
  }

  return (
    <div className="screen">
      {error && !profile && (
        <div className="empty" style={{ marginTop: '48px' }}>
          <div className="empty-mark"/>
          <div className="empty-title">Failed to load profile</div>
          <div className="empty-body">{error}</div>
        </div>
      )}

      <div className="profile-hero">
        <div className="profile-avatar-big">{u.initials}</div>
        <div className="profile-name">{u.name}</div>
        <div className="profile-handle">member since May 2026</div>
        <div className="profile-stars">★★★★★</div>
        <div style={{ fontSize:11,color:'var(--muted)',marginTop:4,fontFamily:'JetBrains Mono,monospace',letterSpacing:'.08em' }}>{(parseFloat(u?.rating) || 0).toFixed(1)} rating · {parseInt(u?.noShows) || 0} no-shows</div>
      </div>

      <div className="profile-mini-stats">
        <div className="profile-mini-cell"><div className="profile-mini-num">{u.deals}</div><div className="profile-mini-label">Completed</div></div>
        <div className="profile-mini-cell"><div className="profile-mini-num">{parseInt(u?.noShows) || 0}</div><div className="profile-mini-label">No-shows</div></div>
        <div className="profile-mini-cell"><div className="profile-mini-num">{(parseFloat(u?.rating) || 0).toFixed(1)}</div><div className="profile-mini-label">Rating</div></div>
      </div>

      <div className="profile-section-label">Games</div>
      {!editingGames ? (
        <div>
          <div style={{ padding:'0 20px 12px',display:'flex',flexWrap:'wrap',gap:8 }}>
            {u.games.map(g=>(
              <span key={g} className="game-chip on" style={{ fontSize:12,padding:'7px 12px' }}>{g}</span>
            ))}
          </div>
          <div style={{ padding:'0 20px 16px' }}>
            <button className="btn btn-secondary" style={{ fontSize:12, width:'100%' }} onClick={() => setEditingGames(true)} disabled={savingGames}>Edit games</button>
          </div>
        </div>
      ) : (
        <div>
          <div style={{ padding:'0 20px 12px',display:'flex',flexWrap:'wrap',gap:8 }}>
            {allGames.map(g=>(
              <button key={g} className={`game-chip ${selectedGames.includes(g)?'on':''}`} style={{ fontSize:12,padding:'7px 12px' }} onClick={()=>toggleGame(g)} disabled={savingGames}>{gameDisplayName(g)}</button>
            ))}
          </div>
          <div style={{ padding:'0 20px 16px', display:'flex', gap:8 }}>
            <button className="btn btn-primary" style={{ flex:1, fontSize:12 }} onClick={handleSaveGames} disabled={savingGames}>Save</button>
            <button className="btn btn-secondary" style={{ flex:1, fontSize:12 }} onClick={handleCancelGames} disabled={savingGames}>Cancel</button>
          </div>
        </div>
      )}

      <div className="profile-section-label">Account</div>
      <div className="profile-row"><div className="profile-row-label">Location</div><div className="profile-row-value">{u.location}</div></div>

      {!editingRadius ? (
        <div>
          <div className="profile-row"><div className="profile-row-label">Travel radius</div><div className="profile-row-value">{u.radius} km</div></div>
          <div style={{ padding:'0 20px 12px' }}>
            <button className="btn btn-secondary" style={{ fontSize:12, width:'100%' }} onClick={() => setEditingRadius(true)} disabled={savingRadius}>Edit radius</button>
          </div>
        </div>
      ) : (
        <div style={{ padding:'16px 20px', background:'white', borderBottom:'1px solid var(--line)' }}>
          <label style={{ fontSize:12, color:'var(--muted)', fontFamily:'JetBrains Mono,monospace', textTransform:'uppercase', letterSpacing:'.08em', display:'block', marginBottom:8 }}>Travel radius: {selectedRadius} km</label>
          <input type="range" min="5" max="100" value={selectedRadius} onChange={(e) => setSelectedRadius(parseInt(e.target.value))} style={{ width:'100%', marginBottom:12 }} disabled={savingRadius}/>
          <div style={{ display:'flex', gap:8 }}>
            <button className="btn btn-primary" style={{ flex:1, fontSize:12 }} onClick={handleSaveRadius} disabled={savingRadius}>Save</button>
            <button className="btn btn-secondary" style={{ flex:1, fontSize:12 }} onClick={handleCancelRadius} disabled={savingRadius}>Cancel</button>
          </div>
        </div>
      )}

      <div className="profile-row"><div className="profile-row-label">Email</div><div className="profile-row-value">{u.email}</div></div>

      <div className="profile-section-label">Activity</div>
      <div className="profile-row"><div className="profile-row-label">Deal history</div><div className="profile-row-value">{u.deals} deals</div></div>
      <div className="profile-row"><div className="profile-row-label">Upcoming meetups</div><div className="profile-row-value">1 scheduled</div></div>
      <div className="profile-row"><div className="profile-row-label">Active listings</div><div className="profile-row-value">3 active</div></div>

      <div className="profile-section-label">Support</div>
      <div className="profile-row" onClick={handleSignOut}><div className="profile-row-label" style={{ color:'var(--bad)' }}>Sign out</div><div className="profile-row-value"/></div>
      <div style={{ height:32 }}/>
    </div>
  );
}

// ─── Root App ─────────────────────────────────────────────────────────────────
function CardMeetApp() {
  const [auth, setAuth] = useState(false);     // false = not logged in
  const [onboarded, setOnboarded] = useState(false);
  const [tab, setTab] = useState('calendar');  // calendar | browse | deals | profile
  const [subScreen, setSubScreen] = useState(null); // { name, data }
  const [toast, setToast] = useState(null);
  const [dealBadge, setDealBadge] = useState(0); // Track badge count from DealsScreen

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null), 2600); };
  const navigate = (to, data) => {
    if (to==='login') { setAuth(false); setSubScreen(null); return; }
    if (['calendar','browse','deals','profile'].includes(to)) { setTab(to); setSubScreen(null); return; }
    setSubScreen({ name:to, data });
  };

  if (!auth) return (
    <div className="phone">
      <StatusBar/>
      <LoginScreen onLogin={() => setAuth(true)}/>
    </div>
  );
  if (!onboarded) return (
    <div className="phone">
      <StatusBar/>
      <OnboardingScreen onDone={()=>setOnboarded(true)}/>
    </div>
  );

  let content = null;
  if (subScreen?.name==='listing') {
    content = <ListingScreen listingId={subScreen.data} onBack={()=>setSubScreen(null)} onMakeOffer={(listingId, amt)=>{ showToast(`Offer sent · ₪${amt.toLocaleString()}`); setSubScreen(null); navigate('deals'); }} onToast={showToast}/>;
  } else if (tab==='calendar') {
    content = <CalendarScreen onNavigate={navigate}/>;
  } else if (tab==='browse') {
    content = <BrowseScreen onNavigate={navigate}/>;
  } else if (tab==='deals') {
    content = <DealsScreen onNavigate={navigate} onToast={showToast} onUpdateBadge={setDealBadge}/>;
  } else if (tab==='profile') {
    content = <ProfileScreen onNavigate={navigate}/>;
  }

  return (
    <div className="phone">
      <StatusBar/>
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', position:'relative' }}>
        {content}
        {toast&&<Toast msg={toast}/>}
      </div>
      {!subScreen&&(
        <div className="tabbar">
          {[
            { id:'calendar', label:'Calendar', icon:'▦' },
            { id:'browse', label:'Browse', icon:'◈' },
            { id:'deals', label:'Deals', icon:'◉', badge:dealBadge },
            { id:'profile', label:'Profile', icon:'◎' },
          ].map(t=>(
            <button key={t.id} className={`tabbar-btn ${tab===t.id?'active':''}`} onClick={()=>navigate(t.id)}>
              <span style={{ fontSize:18,lineHeight:1 }}>{t.icon}</span>
              {t.badge>0&&<span className="tabbar-badge">{t.badge}</span>}
              <span>{t.label}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<CardMeetApp />, document.getElementById('root'));
</script>
</body>
</html>
